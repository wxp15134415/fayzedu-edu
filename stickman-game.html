<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火柴人寻宝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 #e94560;
            letter-spacing: 4px;
        }

        #gameContainer {
            background: #0f0f23;
            border: 4px solid #e94560;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        #statusBar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 5px;
            border: 2px solid #0f3460;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hearts {
            color: #e94560;
            font-size: 1.4rem;
        }

        #gameCanvas {
            border: 2px solid #0f3460;
            display: block;
            background: #228B22;
        }

        #controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: linear-gradient(145deg, #e94560, #c73e54);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #8b2942;
        }

        .control-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .control-btn.confirm {
            width: 200px;
            background: linear-gradient(145deg, #4ecca3, #3db88a);
            box-shadow: 0 4px 0 #2d8a6e;
        }

        .control-btn.confirm:active {
            box-shadow: none;
        }

        .control-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        #startScreen, #gameOverScreen, #levelCompleteScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .screen-title {
            font-size: 3rem;
            color: #e94560;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #fff;
        }

        .screen-subtitle {
            font-size: 1.5rem;
            color: #4ecca3;
            margin-bottom: 30px;
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: linear-gradient(145deg, #e94560, #c73e54);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 0 #8b2942;
            transition: all 0.1s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .start-btn:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .hidden {
            display: none !important;
        }

        #highScore {
            color: #ffd700;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }

        .instructions span {
            color: #4ecca3;
        }
    </style>
</head>
<body>
    <h1>💎 火柴人寻宝 💎</h1>

    <div id="gameContainer">
        <div id="statusBar">
            <div class="status-item">关卡: <span id="level">1</span></div>
            <div class="status-item">生命: <span class="hearts" id="lives">♥♥♥</span></div>
            <div class="status-item">分数: <span id="score">0</span></div>
            <div class="status-item">最高分: <span id="highScore">0</span></div>
            <div class="status-item">钥匙: <span id="keys">0</span> 🔑</div>
        </div>
        <canvas id="gameCanvas" width="450" height="450"></canvas>
        <div id="controls">
            <div class="btn-row">
                <button class="control-btn" id="btnUp">↑</button>
            </div>
            <div class="btn-row">
                <button class="control-btn" id="btnLeft">←</button>
                <button class="control-btn" id="btnDown">↓</button>
                <button class="control-btn" id="btnRight">→</button>
            </div>
            <div class="btn-row">
                <button class="control-btn confirm" id="btnConfirm">确认拾取</button>
            </div>
        </div>
    </div>

    <div class="instructions">
        <span>WASD</span> 移动 | <span>↑↓←→</span> 按钮确认 | 收集所有钻石过关！
    </div>

    <!-- 开始界面 -->
    <div id="startScreen">
        <div class="screen-title">💎 火柴人寻宝 💎</div>
        <div class="screen-subtitle">寻找钻石，躲避敌人！</div>
        <button class="start-btn" id="startBtn">开始游戏</button>
        <div class="instructions" style="margin-top: 30px;">
            <p>收集普通钻石: 💎 +10分</p>
            <p>收集高级钻石: 💠 +30分 (需要🔑钥匙)</p>
            <p>小心敌人！碰到会扣生命！</p>
        </div>
    </div>

    <!-- 游戏结束界面 -->
    <div id="gameOverScreen" class="hidden">
        <div class="screen-title">游戏结束</div>
        <div class="screen-subtitle">最终得分: <span id="finalScore">0</span></div>
        <button class="start-btn" id="restartBtn">重新开始</button>
    </div>

    <!-- 通关界面 -->
    <div id="levelCompleteScreen" class="hidden">
        <div class="screen-title">🎉 通关！</div>
        <div class="screen-subtitle">进入第 <span id="nextLevel">2</span> 关</div>
        <button class="start-btn" id="nextLevelBtn">下一关</button>
    </div>

    <script>
        // 游戏配置
        const TILE_SIZE = 30;
        const COLS = 15;
        const ROWS = 15;

        // 游戏状态
        let game = {
            level: 1,
            score: 0,
            highScore: parseInt(localStorage.getItem('stickmanHighScore')) || 0,
            lives: 3,
            keys: 0,
            map: [],
            player: { x: 1, y: 1 },
            diamonds: [],
            keysOnMap: [],
            enemies: [],
            isPlaying: false,
            selectedDiamond: null
        };

        // 地图元素类型
        const TILE = {
            EMPTY: 0,
            OBSTACLE: 1
        };

        // 初始化画布
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // DOM 元素
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const keysEl = document.getElementById('keys');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const levelCompleteScreen = document.getElementById('levelCompleteScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const nextLevelEl = document.getElementById('nextLevel');

        // 初始化最高分显示
        highScoreEl.textContent = game.highScore;

        // 生成随机地图
        function generateMap() {
            const map = [];
            for (let y = 0; y < ROWS; y++) {
                map[y] = [];
                for (let x = 0; x < COLS; x++) {
                    // 边界是障碍物
                    if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) {
                        map[y][x] = TILE.OBSTACLE;
                    } else {
                        // 随机生成障碍物 (15% 概率)
                        map[y][x] = Math.random() < 0.15 ? TILE.OBSTACLE : TILE.EMPTY;
                    }
                }
            }

            // 确保玩家出生点周围是空的
            map[1][1] = TILE.EMPTY;
            map[1][2] = TILE.EMPTY;
            map[2][1] = TILE.EMPTY;

            return map;
        }

        // 放置物品（确保不重叠且不在障碍物上）
        function placeItem(map, excludePositions, tries = 100) {
            for (let i = 0; i < tries; i++) {
                const x = Math.floor(Math.random() * (COLS - 2)) + 1;
                const y = Math.floor(Math.random() * (ROWS - 2)) + 1;

                if (map[y][x] === TILE.EMPTY) {
                    // 检查是否与排除位置重叠
                    const isExcluded = excludePositions.some(pos => pos.x === x && pos.y === y);
                    if (!isExcluded) {
                        return { x, y };
                    }
                }
            }
            return null;
        }

        // 初始化关卡
        function initLevel() {
            // 计算当前关卡的参数
            const numDiamonds = 3 + game.level * 2;
            const numKeys = Math.ceil(numDiamonds / 4);
            const numEnemies = game.level;

            // 生成地图
            game.map = generateMap();
            game.player = { x: 1, y: 1 };

            // 放置物品
            game.diamonds = [];
            game.keysOnMap = [];
            const usedPositions = [{ x: 1, y: 1 }];

            // 放置普通钻石
            for (let i = 0; i < numDiamonds; i++) {
                const pos = placeItem(game.map, usedPositions);
                if (pos) {
                    const isPremium = i < Math.ceil(numDiamonds / 4);
                    game.diamonds.push({
                        x: pos.x,
                        y: pos.y,
                        isPremium: isPremium,
                        collected: false,
                        nearPlayer: false
                    });
                    usedPositions.push(pos);
                }
            }

            // 放置钥匙
            for (let i = 0; i < numKeys; i++) {
                const pos = placeItem(game.map, usedPositions);
                if (pos) {
                    game.keysOnMap.push({ x: pos.x, y: pos.y, collected: false });
                    usedPositions.push(pos);
                }
            }

            // 放置敌人
            game.enemies = [];
            for (let i = 0; i < numEnemies; i++) {
                const pos = placeItem(game.map, usedPositions);
                if (pos) {
                    game.enemies.push({
                        x: pos.x,
                        y: pos.y,
                        direction: Math.floor(Math.random() * 4),
                        lastMove: 0
                    });
                }
            }

            game.selectedDiamond = null;
            updateUI();
        }

        // 更新UI
        function updateUI() {
            levelEl.textContent = game.level;
            livesEl.textContent = '♥'.repeat(game.lives);
            scoreEl.textContent = game.score;
            keysEl.textContent = game.keys;
            highScoreEl.textContent = game.highScore;

            // 更新确认按钮状态
            const btnConfirm = document.getElementById('btnConfirm');
            const hasNearDiamond = game.diamonds.some(d => d.nearPlayer && d.isPremium && !d.collected);
            btnConfirm.disabled = !hasNearDiamond || game.keys === 0;
        }

        // 绘制火柴人
        function drawStickman(x, y, color = '#000') {
            const cx = x * TILE_SIZE + TILE_SIZE / 2;
            const cy = y * TILE_SIZE + TILE_SIZE / 2;
            const size = TILE_SIZE / 3;

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';

            // 头
            ctx.beginPath();
            ctx.arc(cx, cy - size, size / 2, 0, Math.PI * 2);
            ctx.stroke();

            // 身体
            ctx.beginPath();
            ctx.moveTo(cx, cy - size / 2);
            ctx.lineTo(cx, cy + size / 2);
            ctx.stroke();

            // 手臂
            ctx.beginPath();
            ctx.moveTo(cx - size, cy);
            ctx.lineTo(cx + size, cy);
            ctx.stroke();

            // 腿
            ctx.beginPath();
            ctx.moveTo(cx, cy + size / 2);
            ctx.lineTo(cx - size / 2, cy + size);
            ctx.moveTo(cx, cy + size / 2);
            ctx.lineTo(cx + size / 2, cy + size);
            ctx.stroke();
        }

        // 绘制敌人
        function drawEnemy(x, y) {
            const cx = x * TILE_SIZE + TILE_SIZE / 2;
            const cy = y * TILE_SIZE + TILE_SIZE / 2;
            const size = TILE_SIZE / 3;

            ctx.fillStyle = '#e94560';
            // 身体
            ctx.beginPath();
            ctx.arc(cx, cy, size, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(cx - size / 3, cy - size / 4, size / 4, 0, Math.PI * 2);
            ctx.arc(cx + size / 3, cy - size / 4, size / 4, 0, Math.PI * 2);
            ctx.fill();

            // 瞳孔
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(cx - size / 3, cy - size / 4, size / 8, 0, Math.PI * 2);
            ctx.arc(cx + size / 3, cy - size / 4, size / 8, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制游戏
        function draw() {
            // 清空画布（草地背景）
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制草地纹理
            ctx.fillStyle = '#1e7b1e';
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if ((x + y) % 2 === 0 && game.map[y][x] !== TILE.OBSTACLE) {
                        ctx.fillRect(x * TILE_SIZE + 2, y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    }
                }
            }

            // 绘制障碍物
            ctx.fillStyle = '#696969';
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (game.map[y][x] === TILE.OBSTACLE) {
                        // 绘制石头/树木
                        const cx = x * TILE_SIZE + TILE_SIZE / 2;
                        const cy = y * TILE_SIZE + TILE_SIZE / 2;
                        ctx.beginPath();
                        ctx.arc(cx, cy, TILE_SIZE / 2 - 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // 绘制钥匙
            game.keysOnMap.forEach(key => {
                if (!key.collected) {
                    const cx = key.x * TILE_SIZE + TILE_SIZE / 2;
                    const cy = key.y * TILE_SIZE + TILE_SIZE / 2;
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🔑', cx, cy);
                }
            });

            // 绘制钻石
            game.diamonds.forEach(diamond => {
                if (!diamond.collected) {
                    const cx = diamond.x * TILE_SIZE + TILE_SIZE / 2;
                    const cy = diamond.y * TILE_SIZE + TILE_SIZE / 2;
                    ctx.font = '22px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(diamond.isPremium ? '💠' : '💎', cx, cy);

                    // 如果靠近玩家且是高级钻石，显示提示
                    if (diamond.nearPlayer && diamond.isPremium) {
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(diamond.x * TILE_SIZE + 2, diamond.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    }
                }
            });

            // 绘制敌人
            game.enemies.forEach(enemy => {
                drawEnemy(enemy.x, enemy.y);
            });

            // 绘制玩家（火柴人）
            drawStickman(game.player.x, game.player.y, '#fff');
        }

        // 移动玩家
        function movePlayer(dx, dy) {
            if (!game.isPlaying) return;

            const newX = game.player.x + dx;
            const newY = game.player.y + dy;

            // 检查边界和障碍物
            if (newX >= 0 && newX < COLS && newY >= 0 && newY < ROWS) {
                if (game.map[newY][newX] !== TILE.OBSTACLE) {
                    game.player.x = newX;
                    game.player.y = newY;
                    checkCollisions();
                }
            }
            draw();
        }

        // 检查碰撞
        function checkCollisions() {
            const playerX = game.player.x;
            const playerY = game.player.y;

            // 检查收集钻石
            game.diamonds.forEach(diamond => {
                if (!diamond.collected && diamond.x === playerX && diamond.y === playerY) {
                    if (!diamond.isPremium) {
                        // 普通钻石直接拾取
                        diamond.collected = true;
                        game.score += 10 * (1 + game.level * 0.1);
                        checkLevelComplete();
                    } else {
                        // 高级钻石标记为靠近
                        diamond.nearPlayer = true;
                    }
                } else {
                    diamond.nearPlayer = false;
                }
            });

            // 检查收集钥匙
            game.keysOnMap.forEach(key => {
                if (!key.collected && key.x === playerX && key.y === playerY) {
                    key.collected = true;
                    game.keys++;
                }
            });

            // 检查敌人碰撞
            game.enemies.forEach(enemy => {
                if (enemy.x === playerX && enemy.y === playerY) {
                    game.lives--;
                    if (game.lives <= 0) {
                        gameOver();
                    } else {
                        // 移回出生点附近
                        game.player.x = 1;
                        game.player.y = 1;
                    }
                }
            });

            updateUI();
        }

        // 移动敌人
        function moveEnemies() {
            if (!game.isPlaying) return;

            const directions = [
                { dx: 0, dy: -1 }, // 上
                { dx: 1, dy: 0 },  // 右
                { dx: 0, dy: 1 },  // 下
                { dx: -1, dy: 0 }  // 左
            ];

            game.enemies.forEach(enemy => {
                // 每2秒改变方向
                const now = Date.now();
                if (now - enemy.lastMove > 2000) {
                    enemy.direction = Math.floor(Math.random() * 4);
                    enemy.lastMove = now;
                }

                const dir = directions[enemy.direction];
                const newX = enemy.x + dir.dx;
                const newY = enemy.y + dir.dy;

                // 检查是否可以移动
                if (newX >= 0 && newX < COLS && newY >= 0 && newY < ROWS) {
                    if (game.map[newY][newX] !== TILE.OBSTACLE) {
                        enemy.x = newX;
                        enemy.y = newY;
                    } else {
                        // 碰到障碍物，改变方向
                        enemy.direction = Math.floor(Math.random() * 4);
                    }
                } else {
                    enemy.direction = Math.floor(Math.random() * 4);
                }
            });

            // 再次检查敌人碰撞
            checkCollisions();
            draw();
        }

        // 确认拾取高级钻石
        function confirmPickup() {
            const nearPremiumDiamond = game.diamonds.find(d => d.nearPlayer && d.isPremium && !d.collected);

            if (nearPremiumDiamond && game.keys > 0) {
                nearPremiumDiamond.collected = true;
                game.keys--;
                game.score += 30 * (1 + game.level * 0.1);
                checkLevelComplete();
                updateUI();
                draw();
            }
        }

        // 检查是否通关
        function checkLevelComplete() {
            const allCollected = game.diamonds.every(d => d.collected);
            if (allCollected) {
                levelComplete();
            }
        }

        // 通关
        function levelComplete() {
            game.isPlaying = false;

            if (game.level >= 10) {
                // 通关所有关卡
                gameOver();
                return;
            }

            nextLevelEl.textContent = game.level + 1;
            levelCompleteScreen.classList.remove('hidden');
        }

        // 游戏结束
        function gameOver() {
            game.isPlaying = false;

            // 更新最高分
            if (game.score > game.highScore) {
                game.highScore = Math.floor(game.score);
                localStorage.setItem('stickmanHighScore', game.highScore);
            }

            finalScoreEl.textContent = Math.floor(game.score);
            gameOverScreen.classList.remove('hidden');
        }

        // 开始游戏
        function startGame() {
            game.level = 1;
            game.score = 0;
            game.lives = 3;
            game.keys = 0;
            game.isPlaying = true;

            initLevel();
            draw();
            updateUI();

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            levelCompleteScreen.classList.add('hidden');
        }

        // 下一关
        function nextLevel() {
            game.level++;
            game.keys = 0; // 重置钥匙
            game.isPlaying = true;

            initLevel();
            draw();
            updateUI();

            levelCompleteScreen.classList.add('hidden');
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!game.isPlaying) {
                if (e.key === 'Enter') {
                    if (!startScreen.classList.contains('hidden')) {
                        startGame();
                    } else if (!gameOverScreen.classList.contains('hidden')) {
                        startGame();
                    } else if (!levelCompleteScreen.classList.contains('hidden')) {
                        nextLevel();
                    }
                }
                return;
            }

            switch (e.key.toLowerCase()) {
                case 'w':
                case 'arrowup':
                    movePlayer(0, -1);
                    break;
                case 's':
                case 'arrowdown':
                    movePlayer(0, 1);
                    break;
                case 'a':
                case 'arrowleft':
                    movePlayer(-1, 0);
                    break;
                case 'd':
                case 'arrowright':
                    movePlayer(1, 0);
                    break;
                case 'enter':
                    confirmPickup();
                    break;
            }
        });

        // 按钮控制
        document.getElementById('btnUp').addEventListener('click', () => movePlayer(0, -1));
        document.getElementById('btnDown').addEventListener('click', () => movePlayer(0, 1));
        document.getElementById('btnLeft').addEventListener('click', () => movePlayer(-1, 0));
        document.getElementById('btnRight').addEventListener('click', () => movePlayer(1, 0));
        document.getElementById('btnConfirm').addEventListener('click', confirmPickup);

        // 界面按钮
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);

        // 敌人移动定时器
        setInterval(moveEnemies, 1000);

        // 初始绘制
        draw();
    </script>
</body>
</html>
