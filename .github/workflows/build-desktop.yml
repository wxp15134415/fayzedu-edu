name: Build Desktop

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './edusys/desktop -> target'

      - name: Build Release
        run: |
          cd edusys/desktop
          cargo build --release --target ${{ matrix.target }}

      - name: Create DMG bundle
        run: |
          cd edusys/desktop
          cargo install dioxus-cli || true
          dx bundle --release --target ${{ matrix.target }} 2>/dev/null || echo "Bundle not available, using raw binary"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fayzedu-macos-${{ matrix.target }}
          path: |
            edusys/desktop/target/release/desktop
            edusys/desktop/target/release/bundle/macos/**/*.app
          retention-days: 5

  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Rust formatting
        run: |
          rustup component add rustfmt
          cargo fmt --check --manifest-path edusys/desktop/Cargo.toml

      - name: Check Rust linting
        run: |
          rustup component add clippy
          cargo clippy --manifest-path edusys/desktop/Cargo.toml -- -D warnings
